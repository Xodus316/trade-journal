services:
  postgres:
    image: postgres:16-alpine
    container_name: trade-journal-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: trade-journal-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      API_PORT: ${API_PORT}
    depends_on:
      - postgres
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev:api

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: trade-journal-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_API_URL: ${VITE_API_URL}
    depends_on:
      - api
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm --workspace @trade-journal/web run dev -- --host 0.0.0.0
